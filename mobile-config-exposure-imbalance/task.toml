schema_version="1.1"

[task]
name="codimango/mobile-config-exposure-imbalance"
format="terminal_bench_single_turn"
workstream="swe_public_repo"
description="Write a from-scratch Python script that parses a custom Android mobile config binary and reports the minimum number of configs that must be turned on to reach the maximum total exposure, where turning on a config forces on everything it depends on and configs carry signed exposure deltas (some add exposure, some cost it). Two steps are needed: find the best achievable exposure (which requires weighing forced costs against benefits), then find the smallest rollout that reaches it (excluding configs whose forced cost exactly cancels their benefit). Reporting the exposure value itself is wrong. Graded on held-out files with independent ground truth."
authors=[{name="Tosin Daniel Jimoh",email="purple29th@meta.com"}]
keywords=["binary-parsing","dependency-graph","optimization","android-config","from-scratch"]
