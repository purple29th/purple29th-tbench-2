schema_version="1.1"

[task]
name="codimango/mobile-config-exposure-imbalance"
format="terminal_bench_single_turn"
workstream="swe_public_repo"
description="Write a from-scratch Python script that parses a custom Android mobile config binary and reports the maximum total exposure of a valid config activation set, where activating a config forces activating everything it depends on and configs carry signed exposure weights. This is the maximum-weight dependency closure (project-selection) problem: the obvious readings (sum all positives, take everything, SCC/reachability) are all wrong, and the exact answer needs a min-cut / max-flow reduction implemented by hand. Graded on held-out files with independent max-flow ground truth."
authors=[{name="Tosin Daniel Jimoh",email="purple29th@meta.com"}]
keywords=["binary-parsing","max-flow","min-cut","maximum-weight-closure","project-selection","from-scratch"]
