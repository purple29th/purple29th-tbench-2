schema_version="1.1"

[task]
name="codimango/mobile-config-exposure-imbalance"
format="terminal_bench_single_turn"
workstream="swe_public_repo"
description="Write a from-scratch Python script that parses a custom Android mobile config binary that contains mutually dependent config islands and reports the total weight of the most concentrated reachable island that passes the exposure threshold. This is a reverse engineering task inspired by MRI tumor volume precision where scattered light spread causes overcount. Graded on held-out files with large graphs and offset traps."
authors=[{name="Tosin Daniel Jimoh",email="purple29th@meta.com"}]
keywords=["binary-parsing","graph-traversal","circular-dependency","from-scratch","exposure-imbalance"]
