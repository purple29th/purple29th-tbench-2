schema_version = "1.1"

[task]
name = "codimango/android-okhttp-disk-cache"
description = "Fix bugs in a Kotlin OkHttp/DiskLruCache-style response cache: Vary-aware exact-match reuse, LRU eviction, abort on in-flight commit, disk-tier promotion with cascade eviction, commit dedup, and lastAccess preservation."
authors = [{ name = "Tosin Daniel Jimoh", email = "purple29th@meta.com" }]
keywords = ["kotlin", "android", "okhttp", "disk-cache", "lru-eviction", "bugfix"]

