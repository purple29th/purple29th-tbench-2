schema_version = "1.1"

[task]
name = "codimango/android-tof-subvoxel-volume"
format = "terminal_bench_single_turn"
workstream = "swe_public_repo"
description = "Write a from-scratch Python script (no array/imaging/graph libraries) that parses a custom on-device ToF depth volume binary format and reports the physical volume in mm^3 of the scanned object, whose intensity is spread by the sensor point-spread function. Thresholding cannot recover the volume; the answer requires intensity-conservation (integrate background-subtracted intensity over the isolated object and normalize by the interior plateau amplitude). Graded on held-out scans with independent numpy/scipy ground truth at 3% tolerance."
authors = [{ name = "Tosin Daniel Jimoh", email = "purple29th@meta.com" }]
keywords = ["android", "depth", "tof", "binary-parsing", "point-spread", "partial-volume", "from-scratch"]

[metadata]
author_name = "Tosin Daniel Jimoh"
author_email = "purple29th@meta.com"
difficulty = "hard"
category = "data-science"
category_subdomain = "multimedia_and_signal_processing"
category_usecase = "parsing_lexing"
reward_type = "binary"
tags = ["android", "depth-sensor", "tof", "binary-parsing", "point-spread", "partial-volume", "intensity-conservation", "from-scratch", "algorithms"]
expert_time_estimate_min = 55.0
junior_time_estimate_min = 180.0

[verifier]
timeout_sec = 600.0

[agent]
