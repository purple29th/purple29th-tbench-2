schema_version = "1.1"

[task]
name = "codimango/android-tof-subvoxel-volume"
format = "terminal_bench_single_turn"
workstream = "swe_public_repo"
description = "Android ToF LiDAR parcel scanner: the phone's rear Time-of-Flight sensor dumps a raw occupancy confidence cube (.tvol) from ARCore Depth API + Sensor.TYPE_TOF extended path. The cube's VCSEL lens PSF is anisotropic (wide XY, narrow Z) and obscures thin parcel flaps via partial-volume effects plus flying-pixel specks from multipath. The agent must implement from-scratch Python (stdlib only, no numpy/array/imaging/graph libs) to parse the custom little-endian binary, isolate the main parcel via largest-mass 26-connected component, remove ambient IR background, estimate the saturated interior plateau, and recover sub-voxel volume by conserving total IR energy (integrate residual over object+halo / plateau * anisotropic voxel pitch). Graded on hidden parcel scans at 3% tolerance."
authors = [{ name = "Tosin Daniel Jimoh", email = "purple29th@meta.com" }]
keywords = ["android", "tof", "lidar", "arcore", "depth-api", "package-volume", "vcsel", "flying-pixels", "binary-parsing", "from-scratch"]

[metadata]
author_name = "Tosin Daniel Jimoh"
author_email = "purple29th@meta.com"
difficulty = "hard"
category = "data-science"
category_subdomain = "multimedia_and_signal_processing"
category_usecase = "parsing_lexing"
reward_type = "binary"
tags = ["android", "tof", "lidar", "arcore-depth", "package-scanner", "binary-parsing", "vcsel-psf", "flying-pixels", "partial-volume", "intensity-conservation", "from-scratch", "mobile-vision", "warehouse-logistics"]
expert_time_estimate_min = 55.0
junior_time_estimate_min = 180.0

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 15360
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]
[environment.env]
[solution.env]
