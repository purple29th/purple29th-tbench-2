schema_version = "1.1"

[task]
name = "codimango/android-sensor-deadtime-flux"
format = "terminal_bench_single_turn"
workstream = "swe_public_repo"
description = "Write a from-scratch Python script (standard library only) that parses a custom on-device particle/photon counter binary log and reports the total true number of events. The detector is non-paralyzable: after each recorded count it is blind for a dead time, so at high rates the recorded counts saturate and undercount the truth. Summing the raw counts is wrong; the true total requires inverting the dead-time relation per bin using the per-file dead time and bin width from the header. Graded on held-out logs with independent ground truth."
authors = [{ name = "Tosin Daniel Jimoh", email = "purple29th@meta.com" }]
keywords = ["binary-parsing", "sensor", "dead-time", "saturation", "measurement-recovery", "from-scratch"]

[metadata]
author_name = "Tosin Daniel Jimoh"
author_email = "purple29th@meta.com"
difficulty = "hard"
category = "data-science"
category_subdomain = "multimedia_and_signal_processing"
category_usecase = "parsing_lexing"
reward_type = "binary"
tags = ["binary-parsing", "sensor", "dead-time", "saturation", "measurement-recovery", "from-scratch", "algorithms"]
expert_time_estimate_min = 45.0
junior_time_estimate_min = 150.0

[verifier]
