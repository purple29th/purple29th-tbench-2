schema_version = "1.1"

[task]
name = "codimango/android-depth-object-volume"
format = "terminal_bench_single_turn"
workstream = "swe_public_repo"
description = "Write a from-scratch Python script (no array/imaging/graph libraries) that parses a custom on-device depth volume binary format, isolates the scanned object by hand-written 3D connected-component labeling, and reports its volume in mm^3 accounting for anisotropic voxel spacing. Graded on held-out scans with independent scipy ground truth."
authors = [{ name = "Tosin Daniel Jimoh", email = "purple29th@meta.com" }]
keywords = ["android", "depth", "tof", "binary-parsing", "connected-components", "from-scratch"]

[metadata]
author_name = "Tosin Daniel Jimoh"
author_email = "purple29th@meta.com"
difficulty = "hard"
category = "data-science"
tags = ["android", "depth-sensor", "binary-parsing", "connected-components", "from-scratch", "algorithms"]
expert_time_estimate_min = 45.0
junior_time_estimate_min = 150.0

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 15360
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]
[environment.env]
[solution.env]
