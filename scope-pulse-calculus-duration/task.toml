schema_version = "1.1"

[task]
name = "codimango/scope-pulse-calculus-duration"
format = "terminal_bench_single_turn"
workstream = "swe_public_repo"
description = "Write a from-scratch Python script (no numpy/scipy) that parses a custom oscilloscope photodiode pulse dump (binary .plse) and reports true original pulse duration in ns. The front-end shaper smears the square pulse via normalized Gaussian PSF, so thresholding overcounts smeared tails or undercounts thin extensions. Correct recovery is calculus - charge conservation: true width samples = sum(baseline-subtracted over pulse+halo) / plateau amplitude; duration = width * sampling_interval. Graded on held-out pulses at 3% tolerance."
authors = [{ name = "Tosin Daniel Jimoh", email = "purple29th@meta.com" }]
keywords = ["oscilloscope", "photodiode", "pulse", "shaper", "charge", "duration", "calculus", "integral", "binary-parsing", "from-scratch"]

[metadata]
author_name = "Tosin Daniel Jimoh"
author_email = "purple29th@meta.com"
